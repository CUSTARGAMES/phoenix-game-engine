# .github/workflows/build.yml
name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install MinGW
      run: |
        sudo apt update
        sudo apt install -y gcc-mingw-w64-x86-64
    
    - name: Compile EXE
      run: |
        x86_64-w64-mingw32-gcc \
          game.c \
          -o game.exe \
          -static \
          -lglfw3 -lglew32 -lopengl32 -lgdi32 -lm \
          -O2
    
    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: game.exe
        path: game.exe
