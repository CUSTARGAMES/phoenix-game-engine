# .github/workflows/build.yml
name: Build Game EXE

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Windows EXE
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup MinGW
      uses: egor-tensin/setup-mingw@v2
      with:
        platform: x64
    
    - name: Install dependencies (MSYS2)
      run: |
        pacman -S --noconfirm mingw-w64-x86_64-gcc mingw-w64-x86_64-glfw mingw-w64-x86_64-glew
    
    - name: Compile with GCC
      run: |
        gcc --version
        gcc game.c -o game.exe -lglfw3 -lglew32 -lopengl32 -lgdi32 -lm -static
        ls -lh game.exe
    
    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: 3d-game
        path: game.exe
        retention-days: 30
