name: Build Wolfenstein Engine

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install MinGW
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-mingw-w64-x86-64
    
    - name: Compile
      run: |
        x86_64-w64-mingw32-gcc wolf.c -o wolf.exe -static -O2 -lm -mwindows -Wall
        ls -lh wolf.exe
    
    - name: Package
      run: |
        mkdir release
        cp wolf.exe release/
        
        # Only copy sprites if they exist
        [ -f hand.bmp ] && cp hand.bmp release/ || echo "No hand.bmp"
        [ -f hand2.bmp ] && cp hand2.bmp release/ || echo "No hand2.bmp"
        
        cd release && zip -r ../wolf3d-windows.zip *
    
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: wolf3d-windows
        path: wolf3d-windows.zip
