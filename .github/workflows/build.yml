# .github/workflows/build.yml
name: Build Game EXE

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Windows EXE
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        install: |
          mingw-w64-x86_64-gcc
          mingw-w64-x86_64-glfw
          mingw-w64-x86_64-glew
    
    - name: Compile game
      shell: msys2 {0}
      run: |
        # Fix: Libraries at the END, correct order
        gcc game.c -o game.exe \
          -lglfw3 \
          -lglew32 \
          -lopengl32 \
          -lgdi32 \
          -lm \
          -static
        
        # Verify EXE exists
        ls -lh game.exe || echo "Build failed!"
    
    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: 3d-game
        path: game.exe
        retention-days: 30
