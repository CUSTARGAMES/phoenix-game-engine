# .github/workflows/build-package.yml
name: Build Windows EXE with DLLs

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install MinGW
      run: |
        sudo apt update
        sudo apt install -y gcc-mingw-w64-x86-64
    
    - name: Download GLFW
      run: |
        wget https://github.com/glfw/glfw/releases/download/3.3.8/glfw-3.3.8.bin.WIN64.zip
        unzip glfw-3.3.8.bin.WIN64.zip
    
    - name: Download GLEW
      run: |
        wget https://github.com/nigels-com/glew/releases/download/glew-2.2.0/glew-2.2.0-win32.zip
        unzip glew-2.2.0-win32.zip
    
    - name: Compile
      run: |
        x86_64-w64-mingw32-gcc \
          game.c \
          -o game.exe \
          -I glew-2.2.0/include \
          -I glfw-3.3.8.bin.WIN64/include \
          -L glew-2.2.0/lib/Release/x64 \
          -L glfw-3.3.8.bin.WIN64/lib-mingw-w64 \
          -lglfw3 \
          -lglew32 \
          -lopengl32 \
          -lgdi32 \
          -lm \
          -O2
    
    - name: Copy DLLs
      run: |
        # Create package folder
        mkdir package
        
        # Copy EXE
        cp game.exe package/
        
        # Copy DLLs
        cp glew-2.2.0/bin/Release/x64/glew32.dll package/
        cp glfw-3.3.8.bin.WIN64/lib-mingw-w64/libglfw3.dll package/ || echo "No GLFW DLL found"
        
        # Create README
        echo "Run game.exe" > package/README.txt
        
        # Zip everything
        cd package
        zip -r ../3d-game-windows.zip *
    
    - name: Upload ZIP package
      uses: actions/upload-artifact@v4
      with:
        name: 3d-game-windows
        path: 3d-game-windows.zip
